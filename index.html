<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prompt Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    .container { width: 100%; max-width: 780px; }
    header { text-align: center; margin-bottom: 2rem; }
    header h1 { font-size: 2rem; color: #1a1a2e; }
    header p { color: #555; margin-top: 0.4rem; }

    .api-key-bar {
      background: #fff;
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin-bottom: 1.5rem;
      display: flex;
      gap: 10px;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .api-key-bar label { font-size: 14px; color: #444; white-space: nowrap; }
    .api-key-bar input {
      flex: 1;
      padding: 8px 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .api-key-bar input:focus { border-color: #4285f4; }

    .modes-label {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.6rem;
    }
    .modes { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 1.5rem; }
    .mode-btn {
      padding: 8px 16px;
      border-radius: 30px;
      border: 2px solid #ddd;
      background: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      color: #333;
    }
    .mode-btn:hover { border-color: #4285f4; color: #4285f4; }
    .mode-btn.active { background: #4285f4; border-color: #4285f4; color: #fff; }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      margin-bottom: 1.5rem;
    }
    .mode-description {
      font-size: 13px;
      color: #888;
      margin-bottom: 1rem;
      padding: 8px 12px;
      background: #f0f4ff;
      border-radius: 8px;
      border-left: 3px solid #4285f4;
    }
    textarea {
      width: 100%;
      padding: 12px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 15px;
      resize: vertical;
      outline: none;
      font-family: inherit;
      min-height: 110px;
      line-height: 1.5;
    }
    textarea:focus { border-color: #4285f4; }
    .btn-row { display: flex; gap: 10px; margin-top: 1rem; }
    .btn-primary {
      flex: 1;
      padding: 12px;
      background: #4285f4;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #2b6de0; }
    .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
    .btn-clear {
      padding: 12px 18px;
      background: #f0f0f0;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      color: #555;
    }
    .btn-clear:hover { background: #e0e0e0; }

    .output-card { display: none; }
    .output-card.visible { display: block; }
    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .output-header span { font-weight: 600; color: #333; }
    .copy-btn {
      font-size: 13px;
      color: #4285f4;
      background: none;
      border: 1.5px solid #4285f4;
      border-radius: 8px;
      padding: 4px 12px;
      cursor: pointer;
    }
    .copy-btn:hover { background: #f0f4ff; }
    .output-content {
      font-size: 15px;
      line-height: 1.7;
      color: #222;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .loading { display: none; text-align: center; padding: 2rem; color: #888; }
    .loading.visible { display: block; }
    .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 3px solid #ddd;
      border-top-color: #4285f4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      display: none;
      background: #fff0f0;
      border: 1.5px solid #fcc;
      color: #c00;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      margin-top: 1rem;
    }
    .error-msg.visible { display: block; }
    .char-count { text-align: right; font-size: 12px; color: #aaa; margin-top: 4px; }

    .history-section { margin-top: 1rem; }
    .history-label {
      font-size: 13px; font-weight: 600; color: #888;
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.6rem;
    }
    .history-item {
      background: #f8f8ff;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: border 0.2s;
    }
    .history-item:hover { border-color: #4285f4; }
    .history-item .hi-mode { font-size: 12px; color: #4285f4; font-weight: 600; margin-bottom: 4px; }
    .history-item .hi-text { font-size: 13px; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .powered-by {
      text-align: center;
      font-size: 12px;
      color: #aaa;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>🧪 Prompt Playground</h1>
    <p>Type anything and see how different AI modes transform it</p>
  </header>

  <div class="api-key-bar">
    <label>🔑 Gemini Key:</label>
    <input type="password" id="apiKey" placeholder="Paste your Groq API key here (gsk_...)" />
  </div>

  <div class="modes-label">Choose a mode</div>
  <div class="modes" id="modes"></div>

  <div class="card">
    <div class="mode-description" id="modeDesc">Select a mode above to get started!</div>
    <textarea id="userInput" placeholder="Type your text or question here..."></textarea>
    <div class="char-count"><span id="charCount">0</span> characters</div>
    <div class="btn-row">
      <button class="btn-primary" id="submitBtn" onclick="handleSubmit()">✨ Generate</button>
      <button class="btn-clear" onclick="clearAll()">Clear</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>AI is thinking...</p>
  </div>

  <div class="card output-card" id="outputCard">
    <div class="output-header">
      <span>✅ Response</span>
      <button class="copy-btn" onclick="copyOutput()">Copy</button>
    </div>
    <div class="output-content" id="outputContent"></div>
  </div>

  <div class="history-section" id="historySection" style="display:none">
    <div class="history-label">Recent history (click to reload)</div>
    <div id="historyList"></div>
  </div>

  <div class="powered-by">Powered by Groq (free) — Llama 3</div>
</div>

<script>
  const MODES = [
    {
      id: 'eli5',
      label: '🧒 Explain Like I\'m 5',
      desc: 'Takes any complex topic and explains it in super simple language a child would understand.',
      prompt: (input) => `Explain the following in a very simple, fun way as if talking to a 5-year-old child. Use easy words, simple analogies, and keep it engaging:\n\n${input}`
    },
    {
      id: 'professional',
      label: '💼 Professional Rewrite',
      desc: 'Rewrites your text to sound polished and professional — great for emails or messages.',
      prompt: (input) => `Rewrite the following text to be professional, clear, and polished. Maintain the original meaning but improve tone, grammar, and structure:\n\n${input}`
    },
    {
      id: 'summarize',
      label: '📝 Summarize',
      desc: 'Condenses long text into a short, clear summary with the key points.',
      prompt: (input) => `Summarize the following text in 3-5 bullet points. Be concise and capture only the most important ideas:\n\n${input}`
    },
    {
      id: 'quiz',
      label: '🎯 Quiz Generator',
      desc: 'Turns any text or topic into multiple choice quiz questions — perfect for studying!',
      prompt: (input) => `Create 5 multiple choice quiz questions based on the following topic or text. For each question, provide 4 options (A, B, C, D) and clearly mark the correct answer:\n\n${input}`
    },
    {
      id: 'mentor',
      label: '🧑‍🏫 Mentor Mode',
      desc: 'Gives you wise, encouraging advice on any topic — like having a personal mentor.',
      prompt: (input) => `Act as a wise and supportive mentor. Give thoughtful, practical advice on the following, including actionable steps and encouragement:\n\n${input}`
    },
    {
      id: 'studyplan',
      label: '📅 Study Plan',
      desc: 'Creates a structured week-by-week study plan for any subject or goal.',
      prompt: (input) => `Create a detailed 4-week study plan for the following topic or goal. Include daily tasks, resources to use, and milestones for each week:\n\n${input}`
    },
    {
      id: 'roast',
      label: '🔥 Friendly Roast',
      desc: 'Playfully critiques your idea or writing with humor — then gives real suggestions.',
      prompt: (input) => `Give a friendly, humorous roast of the following idea or text, pointing out its weaknesses in a fun way. Then immediately follow with genuine, constructive suggestions to improve it:\n\n${input}`
    }
  ];

  let selectedMode = MODES[0];
  let history = [];

  function renderModes() {
    const container = document.getElementById('modes');
    container.innerHTML = '';
    MODES.forEach(mode => {
      const btn = document.createElement('button');
      btn.className = 'mode-btn' + (mode.id === selectedMode.id ? ' active' : '');
      btn.textContent = mode.label;
      btn.onclick = () => selectMode(mode);
      container.appendChild(btn);
    });
  }

  function selectMode(mode) {
    selectedMode = mode;
    document.getElementById('modeDesc').textContent = mode.desc;
    renderModes();
  }

  document.getElementById('userInput').addEventListener('input', function () {
    document.getElementById('charCount').textContent = this.value.length;
  });

  async function handleSubmit() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const userInput = document.getElementById('userInput').value.trim();
    const errorMsg = document.getElementById('errorMsg');
    const loading = document.getElementById('loading');
    const outputCard = document.getElementById('outputCard');
    const submitBtn = document.getElementById('submitBtn');

    errorMsg.classList.remove('visible');
    outputCard.classList.remove('visible');

    if (!apiKey) {
      showError('Please enter your Groq API key first! Get one free at console.groq.com');
      return;
    }
    if (!userInput) {
      showError('Please type something in the text box first!');
      return;
    }

    loading.classList.add('visible');
    submitBtn.disabled = true;

    try {
      const prompt = selectedMode.prompt(userInput);

      const response = await fetch('/api/gemini', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ apiKey, prompt })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error?.message || 'Something went wrong. Check your API key.');
      }

      const text = data.choices?.[0]?.message?.content;
      if (!text) throw new Error('No response from Groq. Try again!');

      document.getElementById('outputContent').textContent = text;
      outputCard.classList.add('visible');
      addToHistory(userInput, text);

    } catch (err) {
      showError('Error: ' + err.message);
    } finally {
      loading.classList.remove('visible');
      submitBtn.disabled = false;
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function clearAll() {
    document.getElementById('userInput').value = '';
    document.getElementById('charCount').textContent = '0';
    document.getElementById('outputCard').classList.remove('visible');
    document.getElementById('errorMsg').classList.remove('visible');
  }

  function copyOutput() {
    const text = document.getElementById('outputContent').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    });
  }

  function addToHistory(input, output) {
    history.unshift({ mode: selectedMode.label, input, output });
    if (history.length > 5) history.pop();
    renderHistory();
  }

  function renderHistory() {
    const section = document.getElementById('historySection');
    const list = document.getElementById('historyList');
    if (history.length === 0) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    list.innerHTML = '';
    history.forEach(item => {
      const div = document.createElement('div');
      div.className = 'history-item';
      div.innerHTML = `<div class="hi-mode">${item.mode}</div><div class="hi-text">${item.input}</div>`;
      div.onclick = () => {
        document.getElementById('userInput').value = item.input;
        document.getElementById('outputContent').textContent = item.output;
        document.getElementById('outputCard').classList.add('visible');
      };
      list.appendChild(div);
    });
  }

  selectMode(MODES[0]);
  renderModes();
</script>
</body>
</html>
